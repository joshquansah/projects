services:
  db:
    container_name: postgres-spring-boot
    image: postgres:latest
    env_file:
      - src/main/resources/.env
    volumes:
      - db:/data/postgres
    ports:
      - "5332:5432"
    networks:
      - db
    restart: unless-stopped
networks:
  db:
      driver: bridge
volumes:
  db: